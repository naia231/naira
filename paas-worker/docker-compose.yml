version: '3.8'

services:
  lumen-worker:
    build:
      context: ..
      dockerfile: paas-worker/Dockerfile
    env_file:
      - ../.env
    ports:
      - "${PORT:-8080}:8080"
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
